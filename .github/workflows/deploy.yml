name: Deploy Application

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/janikoke_lara

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Building images ──"
            docker compose -f docker-compose.prod.yml build

            echo "── Running migrations ──"
            docker compose -f docker-compose.prod.yml run --rm app php artisan migrate --force
            docker compose -f docker-compose.prod.yml run --rm app php artisan challenges:update-center-points
            docker compose -f docker-compose.prod.yml run --rm app php artisan areas:update-centroids

            echo "── Restarting services ──"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "── Clearing caches ──"
            docker compose -f docker-compose.prod.yml exec app php artisan route:clear
            docker compose -f docker-compose.prod.yml exec app php artisan config:clear
            docker compose -f docker-compose.prod.yml exec app php artisan view:clear
            docker compose -f docker-compose.prod.yml exec app php artisan route:cache
            docker compose -f docker-compose.prod.yml exec app php artisan config:cache
            docker compose -f docker-compose.prod.yml exec app php artisan view:cache

            echo "── Cleaning up ──"
            docker image prune -f

            echo "✓ Deploy complete"
