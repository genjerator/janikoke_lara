name: Deploy Application

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/janikoke_lara
            git pull origin main
            ./vendor/bin/ composer install --no-dev --optimize-autoloader
            ./vendor/bin/sail artisan migrate
            ./vendor/bin/ artisan optimize
            ./vendor/bin/ artisan challenges:update-center-points
            ./vendor/bin/ artisan areas:update-centroids
            npm run build
