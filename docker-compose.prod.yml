services:
  app:
    build:
      context: .
      dockerfile: docker/8.3/Dockerfile.prod
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:80'
    env_file:
      - .env
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - sail

  pgsql:
    image: 'postgis/postgis:16-3.4'
    restart: unless-stopped
    expose:
      - '5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'sail-pgsql:/var/lib/postgresql/data'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
      retries: 3
      timeout: 5s

  google-auth-service:
    build:
      context: ./google-auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - .env
    restart: always
    depends_on:
      - pgsql
    networks:
      - sail

networks:
  sail:
    driver: bridge

volumes:
  sail-pgsql:
    driver: local